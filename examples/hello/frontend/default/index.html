<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Squareberg</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            color: #333;
            line-height: 1.6;
        }
        h1 { margin-bottom: 24px; }
        section {
            margin-bottom: 24px;
            padding: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        section h2 {
            font-size: 1rem;
            margin-bottom: 12px;
            color: #555;
        }
        button {
            padding: 8px 16px;
            border: 1px solid #888;
            border-radius: 4px;
            background: #f5f5f5;
            cursor: pointer;
            font-size: 0.9rem;
        }
        button:hover { background: #e8e8e8; }
        input[type="text"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
            margin-right: 8px;
        }
        .result {
            margin-top: 12px;
            padding: 8px 12px;
            background: #f9f9f9;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85rem;
            min-height: 1.5em;
        }
    </style>
</head>
<body>
    <h1>Hello World</h1>

    <section>
        <h2>Greeting</h2>
        <button id="btn-hello">Say Hello</button>
        <div class="result" id="result-hello"></div>
    </section>

    <section>
        <h2>Personalized Greeting</h2>
        <input type="text" id="input-name" placeholder="Enter a name">
        <button id="btn-name">Greet</button>
        <div class="result" id="result-name"></div>
    </section>

    <section>
        <h2>Server Time</h2>
        <button id="btn-time">Get Time</button>
        <div class="result" id="result-time"></div>
    </section>

    <script>
        const BASE = "/apps/hello";

        async function fetchAndShow(url, elementId) {
            try {
                const res = await fetch(url);
                const data = await res.json();
                document.getElementById(elementId).textContent = JSON.stringify(data);
            } catch (err) {
                document.getElementById(elementId).textContent = "Error: " + err.message;
            }
        }

        document.getElementById("btn-hello").addEventListener("click", () => {
            fetchAndShow(`${BASE}/api/hello`, "result-hello");
        });

        document.getElementById("btn-name").addEventListener("click", () => {
            const name = document.getElementById("input-name").value.trim();
            if (name) {
                fetchAndShow(`${BASE}/api/hello/${encodeURIComponent(name)}`, "result-name");
            }
        });

        document.getElementById("btn-time").addEventListener("click", () => {
            fetchAndShow(`${BASE}/api/time`, "result-time");
        });
    </script>
</body>
</html>
