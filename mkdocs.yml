site_name: Squareberg
site_description: A local application hub for personal productivity tools
site_url: https://squareberg.github.io/squareberg-hub/
repo_url: https://github.com/squareberg/squareberg-hub
repo_name: squareberg-hub
docs_dir: docs
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Hello World: getting-started/hello-world.md
  - Concepts:
    - Architecture: concepts/architecture.md
    - Apps: concepts/apps.md
    - Frontends: concepts/frontends.md
  - Guide:
    - CLI Reference: guide/cli.md
    - Writing Apps: guide/writing-apps.md
    - API Metadata: guide/api-metadata.md
    - Running as a Service: guide/deployment.md
    - Contributing: guide/contributing.md
  - Reference:
    - manifest.toml: reference/manifest.md
    - Hub API: reference/hub-api.md
    - Python API: reference/python-api.md
