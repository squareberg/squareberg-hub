# Publish squareberg-hub to PyPI when a GitHub Release is published.
# Uses GitHub Trusted Publishers (OIDC) — no API tokens needed.
# Pipeline: test → build (dashboard + sdist/wheel) → publish

name: Publish to PyPI

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # ── 1. Run the test suite ─────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Run tests
        run: pytest tests/

  # ── 2. Build dashboard + Python package ───────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build dashboard
        working-directory: hub/dashboard
        run: |
          npm ci
          npm run build

      - name: Build Python package
        run: |
          python -m pip install build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  # ── 3. Publish to PyPI ────────────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/squareberg-hub

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
